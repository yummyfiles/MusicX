<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" width="300" height="60">
  <style>
    .bar {
      fill: #ffffff;
      transform-origin: bottom;
      animation: bounce 1.2s ease-in-out infinite alternate;
    }
    .bar:nth-child(1) { animation-delay: 0.1s; animation-duration: 0.8s; }
    .bar:nth-child(2) { animation-delay: 0.4s; animation-duration: 1.1s; }
    .bar:nth-child(3) { animation-delay: 0.2s; animation-duration: 0.9s; }
    .bar:nth-child(4) { animation-delay: 0.6s; animation-duration: 1.3s; }
    .bar:nth-child(5) { animation-delay: 0.3s; animation-duration: 1.0s; }
    .bar:nth-child(6) { animation-delay: 0.7s; animation-duration: 1.2s; }
    .bar:nth-child(7) { animation-delay: 0.5s; animation-duration: 0.8s; }

    @keyframes bounce {
      0% { transform: scaleY(0.15); }
      100% { transform: scaleY(1); }
    }
  </style>

  <g transform="translate(0, 55)">
    <rect class="bar" x="10" y="-50" width="6" height="50" />
    <rect class="bar" x="22" y="-50" width="6" height="50" />
    <rect class="bar" x="34" y="-50" width="6" height="50" />
    <rect class="bar" x="46" y="-50" width="6" height="50" />
    <rect class="bar" x="58" y="-50" width="6" height="50" />
    <rect class="bar" x="70" y="-50" width="6" height="50" />
    <rect class="bar" x="82" y="-50" width="6" height="50" />
  </g>
</svg>
